name: Release

# Tag-triggered releases: push an annotated tag `vX.Y.Z` and this creates
# the GitHub Release with notes extracted from that version's CHANGELOG
# section. The Zenodo GitHub integration then archives the release and
# mints the versioned DOI from .zenodo.json — publishing a release IS the
# archival step, so tags only get pushed when CHANGELOG, pyproject,
# CITATION.cff, and codemeta.json already agree on the version.

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match pyproject version $PKG"
            exit 1
          fi

      - name: Extract this version's CHANGELOG section
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk -v ver="$TAG" '
            $0 ~ "^## \\[" ver "\\]" { on=1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            echo "::error::no CHANGELOG section found for $TAG"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "openetruscan $GITHUB_REF_NAME" \
            --notes-file /tmp/notes.md
