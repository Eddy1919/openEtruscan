name: Deploy OpenEtruscan to Podnotes

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/openEtruscan
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            # Rebuild web data assets (languages.js from YAML adapters)
            python3 scripts/build_web_languages.py 2>/dev/null || true

            # Build the new API image (includes web/ for StaticFiles)
            docker compose up -d --build

            # Prune old images to save disk
            docker image prune -f
