name: Deploy Backend to GCE

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'nginx.conf'
      - 'pyproject.toml'
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/19927826393/locations/global/workloadIdentityPools/github-actions/providers/github-provider'
          service_account: 'gh-actions-deployer@long-facet-427508-j2.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@v3

      - name: 'Execute Remote SSH Commands via IAP'
        run: |
          gcloud compute ssh openetruscan-eu \
            --zone=europe-west4-a \
            --project=long-facet-427508-j2 \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=120" \
            --ssh-flag="-n" \
            --command="
              set -e
              REPO_DIR=\$(sudo find /home -maxdepth 2 -name 'openEtruscan' -type d -print -quit)
              if [ -z \"\$REPO_DIR\" ]; then echo 'Repository not found'; exit 1; fi

              # 1. Pull the new code.
              sudo bash -c \"cd \$REPO_DIR && git -c safe.directory='*' fetch --all && git -c safe.directory='*' reset --hard origin/main\"

              # 2. Refresh .env from Secret Manager so we never deploy with a
              # stale/manually-edited .env. Falls back to the existing file if
              # the helper script is unavailable in older deployments.
              if [ -f \$REPO_DIR/scripts/ops/fetch-env-from-sm.sh ]; then
                sudo bash \$REPO_DIR/scripts/ops/fetch-env-from-sm.sh
              fi

              # 3. Build the new image (does not affect running containers).
              sudo docker run --rm -e DOCKER_BUILDKIT=1 -e BUILDKIT_PROGRESS=plain -v /var/run/docker.sock:/var/run/docker.sock -v \"\$REPO_DIR:\$REPO_DIR\" -w=\"\$REPO_DIR\" docker:cli docker compose build api

              # 4. Run alembic migrations BEFORE rotating containers. We
              # bypass `docker compose run` here because compose v2 tries to
              # recreate the api service container as part of `run` even
              # with --no-deps, which collides with the running
              # `openetruscan-api-1`. Plain `docker run` against the image
              # we just built sidesteps that, and using --network on the
              # compose-managed network keeps the migration's DB connection
              # working with whatever DATABASE_URL is in .env.
              sudo docker run --rm --network openetruscan_default --env-file \$REPO_DIR/.env -v \"\$REPO_DIR:\$REPO_DIR\" -w \"\$REPO_DIR\" openetruscan-api alembic upgrade head || {
                echo '::error::Alembic migration failed. Deploy aborted, old api container still serving traffic.'
                exit 1
              }

              # 5. Rotate the api / fuseki / web containers onto the new image.
              sudo docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v \"\$REPO_DIR:\$REPO_DIR\" -w=\"\$REPO_DIR\" docker:cli docker compose up -d --remove-orphans

              sudo docker image prune -f
            "

