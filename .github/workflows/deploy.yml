name: Deploy OpenEtruscan to Podnotes

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/openEtruscan
            git pull origin main

            # Build the new API image
            docker build -t openetruscan-api .

            # Stop and remove old containers gracefully
            docker stop web api 2>/dev/null || true
            docker rm web api 2>/dev/null || true

            # Create network if not exists
            docker network create openetruscan-net 2>/dev/null || true

            # Start API container
            docker run -d --name api --network openetruscan-net \
              --env-file .env \
              --restart unless-stopped \
              openetruscan-api

            # Start Nginx container (with SSL certs if available)
            if [ -d "/etc/letsencrypt/live/openetruscan.com" ]; then
              docker run -d --name web --network openetruscan-net \
                -p 80:80 -p 443:443 \
                -v $(pwd)/web:/usr/share/nginx/html:ro \
                -v $(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
                -v /etc/letsencrypt:/etc/letsencrypt:ro \
                --restart unless-stopped \
                nginx:alpine
            else
              docker run -d --name web --network openetruscan-net \
                -p 80:80 \
                -v $(pwd)/web:/usr/share/nginx/html:ro \
                -v $(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
                --restart unless-stopped \
                nginx:alpine
            fi

            # Prune old images to save disk
            docker image prune -f
