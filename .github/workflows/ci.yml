name: CI

# Replaces Cloud Build triggers `openetruscan-ci-pr` (PR fast lane, py3.12)
# and `openetruscan-ci-matrix` (push-to-main full matrix 3.10–3.13).
#
# The matrix here runs both on PR and on main, gated by the `python-version`
# matrix list. PRs only run 3.12 for speed; pushes to main run the full set.
#
# Postgres + PostGIS service container with a per-Python-version database
# so the four lanes don't race on `create_all` / `drop_all`.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    # Fast, dependency-light gate. ruff is pinned to the same version as
    # .pre-commit-config.yaml and pyproject's [dev] extra so a green local
    # pre-commit guarantees a green CI lint (no silent format drift).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff + mypy (pinned)
        run: pip install --quiet ruff==0.15.22 mypy==2.3.0 types-PyYAML types-requests
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy (src/openetruscan)
        # Same pin + scope as .pre-commit-config.yaml. Runs dependency-light:
        # pyproject sets ignore_missing_imports for third-party modules, so
        # type errors in our own code still gate without installing torch etc.
        run: mypy src/openetruscan/

  openapi-drift:
    # docs/openapi.json is a build artifact of openetruscan.api.server:app.
    # Regenerate into a temp path and diff, so an API change that forgets to
    # re-run the generator fails here instead of shipping a stale spec.
    # Installs from uv.lock (server extras only, no torch) so the diff can't
    # fail on a floating fastapi/pydantic resolution.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package (locked, server extras only)
        run: |
          pip install --quiet uv
          uv sync --locked --extra server --extra lod
      - name: Regenerate OpenAPI spec and diff against committed file
        run: |
          .venv/bin/python scripts/ops/generate_openapi.py --out "$RUNNER_TEMP/openapi.json"
          if ! diff -u docs/openapi.json "$RUNNER_TEMP/openapi.json"; then
            echo "::error file=docs/openapi.json::docs/openapi.json is stale; regenerate with 'python scripts/ops/generate_openapi.py' and commit the result"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # On PRs only 3.12 runs; on push to main, the full matrix.
        python-version: ${{ github.event_name == 'pull_request' && fromJson('["3.12"]') || fromJson('["3.10", "3.11", "3.12", "3.13"]') }}
    services:
      postgres:
        # pgvector/pgvector replaces postgis/postgis: the old image had
        # PostGIS but NOT pgvector, so conftest's CREATE EXTENSION vector
        # silently failed and every embedding/multilingual test self-skipped
        # — green CI with the vector search path untested. This image flips
        # the trade: pgvector present (13 previously-skipped tests now run),
        # PostGIS absent (its tests carry their own skip markers and were
        # never running anywhere). A combined image can restore PostGIS later.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # One database per lane so create_all/drop_all don't race across matrix shards.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_py${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v7

      - name: Create per-lane Postgres database and assert pgvector
        # The CREATE EXTENSION here is a hard gate: if the service image ever
        # loses pgvector again, this step fails the job loudly instead of
        # letting the suite go green on silent skips.
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE \"test_py${{ matrix.python-version }}\""
          PGPASSWORD=postgres psql -h localhost -U postgres -d "test_py${{ matrix.python-version }}" -c "CREATE EXTENSION IF NOT EXISTS vector"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: pip install --quiet -e ".[dev]"

      - name: Pytest
        # --cov-fail-under turns coverage from informational into a gate.
        # Floor = 45: measured 49% against a pgvector-backed Postgres on
        # 2026-07-17; the 4-point headroom absorbs lane/env variance. Raise
        # it as coverage grows — never lower it to make a PR pass.
        run: |
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            pytest tests/ -v --tb=short -m "not slow and not real_model" \
              --cov=openetruscan --cov-report=term-missing --cov-fail-under=45
          else
            pytest tests/ -v --tb=short -m "not slow and not real_model"
          fi

      - name: Service env-contract tests
        # pyproject testpaths=["tests"] excludes services/; without this
        # step the byt5-restorer no-silent-fallback guarantee never runs
        # in CI.
        run: pytest services/byt5-restorer/ -q --no-cov
