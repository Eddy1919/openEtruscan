name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # needed for Workload Identity Federation (push-image job)

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: pytest tests/ -v --tb=short -m "not slow"

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: pytest tests/ -m "not slow" --cov=openetruscan --cov-report=term-missing

  typecheck-mypy:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-typecheck-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-
            ${{ runner.os }}-pip-

      - name: Cache mypy cache
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: ${{ runner.os }}-mypy-${{ hashFiles('pyproject.toml', 'src/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-mypy-

      - name: Install dependencies
        run: pip install -e ".[dev]" mypy

      - name: Run mypy type check
        continue-on-error: true
        run: mypy src/openetruscan

  typecheck-pyright:
    name: Type Check (pyright)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-pyright-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]" pyright

      - name: Run pyright type check
        continue-on-error: true
        run: pyright src/openetruscan

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]" bandit pip-audit

      - name: Run Bandit security scan
        run: bandit -r src/openetruscan/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Run pip-audit dependency scan
        run: pip-audit --desc --format=json -o pip-audit-report.json || true

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  push-image:
    name: Push API Image to Artifact Registry
    needs: [test]
    # Gated on the `ENABLE_AR_PUSH` repo variable so the job stays silent
    # until the one-time GCP-side setup (WIF pool/provider, service account,
    # AR repo) is complete. See `docs/internal/SETUP_WIF.md`.
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.ENABLE_AR_PUSH == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GAR_LOCATION: europe-west4
      GAR_REPO: openetruscan
      IMAGE_NAME: api
      PROJECT_ID: long-facet-427508-j2

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Reuses the same WIF pool/provider that .github/workflows/deploy.yml
          # already authenticates against — `github-actions` / `github-provider`,
          # bound in long-facet-427508-j2 (project number 19927826393). Earlier
          # this referenced a hypothetical `github-pool` from the runbook draft;
          # the actual pool the maintainer created is `github-actions`.
          workload_identity_provider: projects/19927826393/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: gh-actions-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  search-quality:
    name: Search quality (NDCG@10)
    # Gated on the `ENABLE_SEARCH_EVAL` repo variable so the job stays silent
    # by default. Flip to true when:
    #   - the eval gold set in evals/search_eval_queries.jsonl is reviewed
    #   - the prod /search/hybrid endpoint is stable
    # The harness paces requests at 1.05 s, so 90 queries take ~95 s. Cost:
    # one job-minute per main push.
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.ENABLE_SEARCH_EVAL == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EVAL_API_URL: ${{ vars.EVAL_API_URL || 'https://api.openetruscan.com' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install httpx
        run: pip install "httpx>=0.25"

      - name: Run NDCG@10 eval
        run: python evals/run_search_eval.py --api-url "$EVAL_API_URL"
