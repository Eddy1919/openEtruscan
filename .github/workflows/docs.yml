name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  openapi-sync:
    name: Verify OpenAPI Schema
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[server,prosopography]"

      - name: Export OpenAPI schema
        run: python scripts/data_pipeline/export_openapi.py

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain docs/openapi.json)" ]; then
            echo "❌ OpenAPI schema is out of sync!"
            git diff docs/openapi.json
            exit 1
          else
            echo "✅ OpenAPI schema is up to date."
          fi

      - name: Upload OpenAPI Artifact
        uses: actions/upload-artifact@v7
        with:
          name: openapi-schema
          path: docs/openapi.json
