name: Security

# Replaces the `openetruscan-security` Cloud Build trigger.
# Scope: Gitleaks (secrets) + pip-audit (known CVEs in the locked
# dependency graph). Bandit + Semgrep stay dropped for chronic
# false-positive rate — that decision is in the .gitleaks.toml header.
# pip-audit was reinstated 2026-07-17: auditing pinned versions in
# uv.lock has a different (near-zero) false-positive profile from
# static-analysis heuristics, and detection-after-merge is not a gate.

# No paths/paths-ignore filters on these triggers: gitleaks and pip-audit
# are candidates for required checks under the operator's upcoming ruleset,
# and a required check whose workflow is filtered out of a PR never reports
# a status — the PR blocks forever.
on:
  push:
    branches: [main]
  # On PRs so a leaked secret or vulnerable pin is caught BEFORE it
  # lands on the public main, not by the weekly cron afterwards.
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 03:00 UTC catch-all, same as the old Cloud Build cron.
    - cron: "0 3 * * 1"

permissions:
  contents: read

# One run per workflow+event+ref: a superseded push cancels the in-flight
# push run. GitHub-hosted runners are free for public repos, so the win is
# queue latency and notification noise, not billing. event_name is in the
# group so a push to main can never cancel the weekly cron's full-history
# sweep (gitleaks-action scans differently on schedule vs push).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so Gitleaks can scan all commits, not just the tip.
          fetch-depth: 0

      # The gitleaks binary directly, not gitleaks-action: the action
      # phones the GitHub API to classify the repo owner and, when that
      # call is rate-limited, fails the job demanding a commercial
      # license key without ever scanning (observed 2026-07-18). The
      # pinned binary has no API dependency and no license path.
      - name: Gitleaks scan (pinned binary, full history)
        run: |
          curl -sSfL -o /tmp/gitleaks.tgz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config .gitleaks.toml \
            --redact --verbose

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v6

      - name: Export the locked dependency graph
        run: uv export --frozen --no-emit-project -o /tmp/requirements.txt

      - name: Audit pinned versions for known CVEs
        # --disable-pip audits the pins as written instead of re-resolving;
        # the export is fully pinned so nothing is skipped.
        run: uvx pip-audit -r /tmp/requirements.txt --disable-pip
