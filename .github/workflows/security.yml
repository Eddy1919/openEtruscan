name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run at 00:00 UTC on Mondays
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit scan
        run: bandit -r src/openetruscan/ -ll -ii

  pip-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pip-audit
          pip install -e ".[dev]"

      - name: Run pip-audit
        # CVE-2026-3219 is in pip itself (the build tool, not a project
        # runtime dependency). It is patched in pip 26.x; the GitHub-hosted
        # runner pins an older pip via setup-python's cache, so the audit
        # always flags it. Ignore for now and revisit when GHA's hosted
        # Python image upgrades pip.
        run: pip-audit --desc --ignore-vuln CVE-2026-3219 --ignore-vuln PYSEC-2026-3219 --ignore-vuln GHSA-4xh5-x5gv-qwph

  semgrep:
    name: Semgrep Static Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep
        # The legacy sync `Corpus` class in core/corpus.py builds parameterised
        # Postgres queries with f-strings whose substitutions are static
        # constants. The sqlalchemy-execute-raw-query rule cannot tell that
        # the substitution is not user input and flags every usage. We've
        # inspected each call site; user input is always passed via %s
        # parameters. Excluded explicitly here because .semgrepignore is not
        # always honoured by the rule pack runner.
        run: semgrep scan --config auto --error
              --exclude src/openetruscan/core/corpus.py
              --exclude scripts/
              --exclude tests/

  gitleaks:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # Optional

  # NOTE: CodeQL is handled by GitHub's built-in "default setup" (Settings → Code security).
  # Do NOT add a custom CodeQL job here — it conflicts with the default setup.
