# OpenEtruscan API edge config.
#
# Mounted into the `web` (nginx:alpine) container as
# /etc/nginx/conf.d/default.conf via the docker-compose volume. Cert files
# come in at /certs from the host's letsencrypt directory.
#
# History: this file was historically gitignored. It is now tracked so that
# changes to security headers, rate limiting, and probe filtering ride along
# with the API code review process. See ROADMAP.md "P2: nginx hardening".

# Drop scanner traffic that hits the raw IP (no SNI / Host: openetruscan.com).
# Returning 444 closes the connection silently and keeps Cloud Logging cheap
# once the ops agent is on. nginx default_server matches IP-direct probes.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    ssl_certificate     /certs/fullchain.pem;
    ssl_certificate_key /certs/privkey.pem;
    server_name _;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.openetruscan.com;

    # Block common scanner paths even before the redirect so nginx access logs
    # do not collect noise once log shipping is on.
    location ~* (^/\.env|^/\.git|^/wp-|^/wordpress|^/phpmyadmin|^/boaform|^/admin/login|^/cgi-bin) {
        return 444;
    }

    # Redirect everything else to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.openetruscan.com;

    ssl_certificate     /certs/fullchain.pem;
    ssl_certificate_key /certs/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # OCSP stapling — lets clients verify the cert without an extra round-trip
    # to letsencrypt's OCSP responder.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ── Real client IP ───────────────────────────────────────────────
    # The api container's slowapi rate limiter keys on client IP. Without this
    # block it sees the docker bridge's gateway IP for every request. Trust
    # the X-Forwarded-For only when it comes via the docker bridge subnets.
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ── Compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/ld+json
        application/xml
        application/x-protobuf
        application/atom+xml
        text/plain
        text/css
        text/xml
        application/javascript;

    # ── Security Headers ─────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 1m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=(), browsing-topics=()" always;

    # Drop scanner paths inside the host block too.
    location ~* (^/\.env|^/\.git|^/wp-|^/wordpress|^/phpmyadmin|^/boaform|^/admin/login|^/cgi-bin) {
        return 444;
    }

    # ── SPARQL Endpoint (/sparql) → Fuseki ────────────────
    location /sparql {
        rewrite ^/sparql(.*)$ /openetruscan/sparql$1 break;

        proxy_pass http://fuseki:3030;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS for browser-based SPARQL clients
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # ── API (everything else) → FastAPI ────────────────────
    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;
    }
}
