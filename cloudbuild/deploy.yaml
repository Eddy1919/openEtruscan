# Cloud Build — production deploy.
#
# Replaces .github/workflows/deploy.yml. Triggered on push-to-main when
# any of src/**, Dockerfile, docker-compose.yml, nginx.conf, pyproject.toml,
# data/** changes (path filter configured on the trigger; see
# cloudbuild/README.md).
#
# Single GCP project: long-facet-427508-j2.
# Build, Artifact Registry, GCE VM `openetruscan-eu` all live here. The
# trigger is configured to run the build as
# `gh-actions-deployer@long-facet-427508-j2.iam.gserviceaccount.com`
# (set on the trigger via `--service-account`, not in this file), which
# already has roles for IAP-Tunnel, GCE SSH, AR write, and SM access
# from the GH-Actions era. No cross-project impersonation, no token
# minting; the build SA is the deploy SA.
#
# Pipeline:
#   1. Lint (ruff).
#   2. Build the API image with the same Dockerfile as before.
#   3. Push to Artifact Registry (`europe-west4-docker.pkg.dev/long-facet-427508-j2/openetruscan/api`).
#   4. IAP SSH into openetruscan-eu, refresh .env from SM, run alembic
#      migrations, rotate compose services. Same script as before,
#      transcribed verbatim — we are NOT redesigning the on-VM deploy.

substitutions:
  _PROJECT: long-facet-427508-j2
  _AR_LOCATION: europe-west4
  _AR_REPO: openetruscan
  _IMAGE_NAME: api
  _VM_NAME: openetruscan-eu
  _VM_ZONE: europe-west4-a
  # OS-Login profile username for `gh-actions-deployer@long-facet-427508-j2.iam.gserviceaccount.com`.
  # Derived from the SA's uniqueId as `sa_<uniqueId>`; this is constant
  # unless the SA itself is recreated. Without specifying the user
  # explicitly, gcloud compute ssh falls back to the Cloud Build
  # container's local user (root) and OS-Login denies it with
  # "Permission denied (publickey)".
  _SSH_USER: sa_103597837589449401717

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

timeout: 1800s  # 30 min hard cap; healthy deploys land in 5-8 min.

steps:
  # ───────────────────────────────────────────────────────────────
  # 1. Lint gate — match the deploy.yml `lint` job. If ruff fails, no
  #    deploy.
  # ───────────────────────────────────────────────────────────────
  - id: lint
    name: python:3.12-slim
    waitFor: ['-']
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        pip install --quiet --no-cache-dir 'ruff>=0.6'
        ruff check .

  # ───────────────────────────────────────────────────────────────
  # 2. Build the image and tag it for AR.
  # ───────────────────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    waitFor: [lint]
    args:
      - build
      - -t
      - ${_AR_LOCATION}-docker.pkg.dev/${_PROJECT}/${_AR_REPO}/${_IMAGE_NAME}:sha-${SHORT_SHA}
      - -t
      - ${_AR_LOCATION}-docker.pkg.dev/${_PROJECT}/${_AR_REPO}/${_IMAGE_NAME}:latest
      - .

  # ───────────────────────────────────────────────────────────────
  # 3. Push to Artifact Registry. Same-project push — the build SA
  #    (gh-actions-deployer, set on the trigger) already has AR write
  #    perms; no impersonation needed.
  # ───────────────────────────────────────────────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_AR_LOCATION}-docker.pkg.dev/${_PROJECT}/${_AR_REPO}/${_IMAGE_NAME}

  # ───────────────────────────────────────────────────────────────
  # 4. IAP SSH into the GCE VM and run the on-VM deploy script.
  #    Same body as the old deploy.yml `Execute Remote SSH Commands
  #    via IAP` step, transcribed. No --impersonate-service-account
  #    here either — the build SA is already gh-actions-deployer.
  # ───────────────────────────────────────────────────────────────
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud compute ssh ${_SSH_USER}@${_VM_NAME} \
          --zone=${_VM_ZONE} \
          --project=${_PROJECT} \
          --tunnel-through-iap \
          --quiet \
          --ssh-flag="-o ServerAliveInterval=30" \
          --ssh-flag="-o ServerAliveCountMax=120" \
          --ssh-flag="-n" \
          --command='
            set -e
            # Cloud Build interprets bare-shell vars in this YAML as
            # substitution keys; bash vars in the remote command are
            # escaped with double-dollar so the parser passes them
            # through verbatim. Do NOT write a literal escape example
            # in this comment — the parser sees it through the bash
            # # too and tries to resolve "FOO" or whatever you used.
            REPO_DIR=$$(sudo find /home -maxdepth 2 -name "openEtruscan" -type d -print -quit)
            if [ -z "$$REPO_DIR" ]; then echo "Repository not found"; exit 1; fi

            # 1. Pull the new code.
            sudo bash -c "cd $$REPO_DIR && git -c safe.directory=\"*\" fetch --all && git -c safe.directory=\"*\" reset --hard origin/main"

            # 2. Refresh .env from Secret Manager so we never deploy with a
            # stale/manually-edited .env. The script is the only writer.
            if [ -f $$REPO_DIR/scripts/ops/fetch-env-from-sm.sh ]; then
              sudo bash $$REPO_DIR/scripts/ops/fetch-env-from-sm.sh
            fi

            # 3. Build the new image locally on the VM (kept for parity
            # with the GH-Actions flow; we could swap to `docker pull`
            # against AR once the migration settles).
            sudo docker run --rm -e DOCKER_BUILDKIT=1 -e BUILDKIT_PROGRESS=plain -v /var/run/docker.sock:/var/run/docker.sock -v "$$REPO_DIR:$$REPO_DIR" -w="$$REPO_DIR" docker:cli docker compose build api

            # 4. Run alembic migrations BEFORE rotating containers. --user 0
            # is needed because pydantic-settings reads .env on import and
            # the default appuser cannot read the 600-perms file.
            sudo docker run --rm --user 0 --network openetruscan_default --env-file $$REPO_DIR/.env -v "$$REPO_DIR:$$REPO_DIR" -w "$$REPO_DIR" openetruscan-api alembic upgrade head || {
              echo "::error::Alembic migration failed. Deploy aborted, old api container still serving traffic."
              exit 1
            }

            # 5. Rotate compose services onto the new image. Sweep any
            # stale temp-renamed containers compose v2 leaves behind when
            # a prior --force-recreate was interrupted.
            sudo docker ps -a --filter name=openetruscan --format "{{.ID}}" | xargs -r sudo docker rm -f
            sudo docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$$REPO_DIR:$$REPO_DIR" -w="$$REPO_DIR" docker:cli docker compose up -d --force-recreate --remove-orphans

            sudo docker image prune -f
          '

# We don't declare `images:` because we push manually via the gcloud-helper
# auth in step `push`. (Declaring `images:` triggers a second push attempt
# without impersonation, which fails since the Cloud Build SA has no AR
# write role in long-facet.)
