# Cloud Build — Stream A (Classification) gold-annotation pipeline.
#
# Runs the v2 three-stage flow as a single Cloud Build job:
#   1. classify_split.py    — produces the frozen stratified test pool
#   2. classify_jury.py     — multi-model LLM jury (Claude + Gemini + DeepSeek)
#   3. classify_adjudicate.py — Krippendorff α + candidate gold + adjudication queue
#
# Project: long-facet-427508-j2 (per the project-split rule: compute lives
# here, Vertex API spend bills to double-runway-465420-h9 via the
# VERTEX_PROJECT_ID env var the scripts already read).
#
# Submit (from a shell with a working gcloud):
#   gcloud builds submit . \
#     --project=long-facet-427508-j2 \
#     --config=cloudbuild/v2-classify-jury.yaml \
#     --substitutions=_N_TEST=400
#
# Inputs (read-only):
#   gs://openetruscan-rosetta/corpus/openetruscan_clean.csv
#   research/data/openetruscan_labels.csv (in the build context, this repo)
#   research/v2/codebooks/classification.md (in the build context)
#
# Outputs (timestamped):
#   gs://long-facet-427508-j2_cloudbuild/openetruscan-v2/classify/<TS>/
#     ├── classify_train_pool.jsonl
#     ├── classify_test_v2.jsonl
#     ├── classify_jury_raw.jsonl
#     ├── classify_candidate_gold.jsonl
#     ├── classify_adjudication_queue.jsonl
#     └── classify_jury_summary.json

substitutions:
  # The silver-labels CSV is a mix of publication ids (CIE/Pallottino-Rix/ETP)
  # and integer DB ids — neither corpus file alone joins all 712 silver rows.
  # The pipeline fetches BOTH and merges them. Publication-id source wins on
  # collision (deterministic).
  _CORPUS_PUB_GS: gs://openetruscan-rosetta/corpus/etruscan-prod-v2.jsonl
  _CORPUS_INT_GS: gs://openetruscan-rosetta/corpus/etruscan-prod-rawtext-v3.jsonl
  _OUTPUT_BUCKET: long-facet-427508-j2_cloudbuild
  _OUTPUT_PREFIX: openetruscan-v2/classify
  _N_TEST: "400"
  _SEED: "42"
  # Adjudicator's required-n-raters floor. Pre-registration says 3 (true
  # jury). Override to 1 only for smoke configurations where you're testing
  # the pipeline plumbing, not the data.
  _REQUIRE_N_RATERS: "3"
  # Default 3-rater jury. Claude is currently quota-zero (use --substitutions
  # =_PROVIDERS="gemini-2.5-pro llama-4-scout" for a 2-rater smoke while
  # waiting for the Anthropic quota increase).
  _PROVIDERS: "claude-haiku-4-5 gemini-2.5-pro llama-4-maverick"

  # Vertex billing project — the SCRIPTS read these, the Cloud Build runs
  # in long-facet but every API call is billed to double-runway.
  _VERTEX_PROJECT_ID: double-runway-465420-h9
  _VERTEX_REGION: europe-west1
  _MAAS_VERTEX_REGION: us-east5

  # Secret Manager: the Gemini key lives in long-facet (oe-gemini-api-key),
  # not double-runway. Pipeline scripts read these env vars via _secrets.py.
  _SECRET_PROJECT_ID: long-facet-427508-j2
  _GEMINI_SECRET_NAME: oe-gemini-api-key

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  env:
    - VERTEX_PROJECT_ID=${_VERTEX_PROJECT_ID}
    - VERTEX_REGION=${_VERTEX_REGION}
    - MAAS_VERTEX_REGION=${_MAAS_VERTEX_REGION}
    - SECRET_MANAGER_PROJECT_ID=${_SECRET_PROJECT_ID}
    - GEMINI_SECRET_NAME=${_GEMINI_SECRET_NAME}

timeout: 14400s  # 4-hour cap. 3-rater w/ Sonnet-4.6 averages ~7s/call (Sonnet
                 # is the slow rater; Gemini & Llama are ~2s). 1200 calls × ~7s
                 # ≈ 140 min model time + 20 min for split/install/adjudicate/
                 # upload + headroom. 2-hour cap timed out at 1025/1200 on
                 # 2026-05-23 (build 48023b39); 4-hour gives margin.

steps:
  # ───────────────────────────────────────────────────────────────
  # 1. Pull the gitignored corpus into the build workspace.
  # ───────────────────────────────────────────────────────────────
  - id: fetch-corpus
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: ['-']
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        mkdir -p research/data
        echo "Fetching publication-id corpus: ${_CORPUS_PUB_GS} ..."
        gcloud storage cp "${_CORPUS_PUB_GS}" research/data/corpus_pub.jsonl
        echo "Fetching integer-id corpus: ${_CORPUS_INT_GS} ..."
        gcloud storage cp "${_CORPUS_INT_GS}" research/data/corpus_int.jsonl
        echo "  pub: $(wc -l < research/data/corpus_pub.jsonl) rows"
        echo "  int: $(wc -l < research/data/corpus_int.jsonl) rows"

  # ───────────────────────────────────────────────────────────────
  # 2. Install the SDKs the jury needs into a SHARED location.
  #
  # Cloud Build steps each get their own container, so `pip install`
  # into the default site-packages does NOT survive to the next step.
  # We install into /workspace/deps (which IS shared across steps) and
  # downstream steps prepend it to PYTHONPATH.
  # ───────────────────────────────────────────────────────────────
  - id: install
    name: python:3.12
    waitFor: ['-']
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        pip install --quiet --no-cache-dir --target=/workspace/deps \
          'anthropic[vertex]>=0.40' \
          'google-generativeai>=0.8' \
          'openai>=1.50' \
          'google-cloud-secret-manager>=2.20' \
          'google-auth>=2.30' \
          'google-cloud-storage>=2.16'
        PYTHONPATH=/workspace/deps python -c \
          "import anthropic, google.generativeai, openai, google.cloud.secretmanager, google.auth; print('deps ok')"

  # ───────────────────────────────────────────────────────────────
  # 3. Frozen stratified split.
  # ───────────────────────────────────────────────────────────────
  - id: split
    name: python:3.12
    waitFor: [fetch-corpus, install]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        export PYTHONPATH=/workspace/deps:${PYTHONPATH:-}
        python -m research.v2.pipelines.classify_split \
          --corpus research/data/corpus_pub.jsonl \
          --corpus research/data/corpus_int.jsonl \
          --silver research/data/openetruscan_labels.csv \
          --out-train /workspace/classify_train_pool.jsonl \
          --out-test  /workspace/classify_test_v2.jsonl \
          --n-test ${_N_TEST} \
          --seed ${_SEED}

  # ───────────────────────────────────────────────────────────────
  # 4. LLM-jury. This is the expensive step (~$15-30).
  #    ADC works because Cloud Build's SA has Vertex + Secret Manager
  #    access cross-project to double-runway.
  # ───────────────────────────────────────────────────────────────
  - id: jury
    name: python:3.12
    waitFor: [split]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        export PYTHONPATH=/workspace/deps:${PYTHONPATH:-}
        # --sleep 0.1 cuts dead wall-time without hitting Gemini/Llama RPM
        # limits in practice (Sonnet is the slow rater, not the throttled one).
        #
        # Partial-progress upload strategy: a Python background process syncs
        # /workspace/classify_jury_raw.jsonl to GCS every 60s. Earlier version
        # used `gcloud storage cp` but this container is python:3.12 with no
        # gcloud installed, so we use google-cloud-storage instead. The
        # background process is also trapped on EXIT/TERM to do a final flush.
        TS=$(date -u +%Y%m%dT%H%M%SZ)
        DEST_BUCKET="${_OUTPUT_BUCKET}"
        DEST_PREFIX="${_OUTPUT_PREFIX}/$$TS-partial"

        cat > /workspace/sync_partial.py <<PYEOF
        import os, sys, time, traceback
        from pathlib import Path
        from google.cloud import storage
        SRC = Path("/workspace/classify_jury_raw.jsonl")
        bucket_name = os.environ["DEST_BUCKET"]
        blob_path = os.environ["DEST_PREFIX"] + "/classify_jury_raw.jsonl"
        client = storage.Client()
        bucket = client.bucket(bucket_name)
        def upload_once():
            if not SRC.exists() or SRC.stat().st_size == 0: return False
            try:
                bucket.blob(blob_path).upload_from_filename(str(SRC))
                print(f"  [partial-sync] uploaded {SRC.stat().st_size}B → gs://{bucket_name}/{blob_path}", flush=True)
                return True
            except Exception as e:
                print(f"  [partial-sync] failed: {e}", flush=True)
                return False
        mode = sys.argv[1] if len(sys.argv) > 1 else "loop"
        if mode == "loop":
            while True:
                time.sleep(60); upload_once()
        else:
            upload_once()
        PYEOF

        # Background sync (Python; works in python:3.12 image)
        DEST_BUCKET="$$DEST_BUCKET" DEST_PREFIX="$$DEST_PREFIX" \
          python /workspace/sync_partial.py loop &
        SYNC_PID=$!

        flush_partial() {
          # Best-effort final flush on exit.
          DEST_BUCKET="$$DEST_BUCKET" DEST_PREFIX="$$DEST_PREFIX" \
            python /workspace/sync_partial.py once 2>/dev/null || true
          kill $$SYNC_PID 2>/dev/null || true
        }
        trap flush_partial EXIT
        trap 'flush_partial; exit 143' TERM

        python -m research.v2.pipelines.classify_jury \
          --test-pool /workspace/classify_test_v2.jsonl \
          --out /workspace/classify_jury_raw.jsonl \
          --providers ${_PROVIDERS} \
          --sleep 0.1

  # ───────────────────────────────────────────────────────────────
  # 5. Adjudication queue build — local, free, fast.
  # ───────────────────────────────────────────────────────────────
  - id: adjudicate
    name: python:3.12
    waitFor: [jury]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        export PYTHONPATH=/workspace/deps:${PYTHONPATH:-}
        python -m research.v2.pipelines.classify_adjudicate \
          --jury /workspace/classify_jury_raw.jsonl \
          --test-pool /workspace/classify_test_v2.jsonl \
          --out-gold /workspace/classify_candidate_gold.jsonl \
          --out-queue /workspace/classify_adjudication_queue.jsonl \
          --out-summary /workspace/classify_jury_summary.json \
          --require-n-raters ${_REQUIRE_N_RATERS}
        echo "── summary ─────────────────────────────────────────"
        cat /workspace/classify_jury_summary.json

  # ───────────────────────────────────────────────────────────────
  # 6. Upload all outputs to GCS with a UTC timestamp prefix.
  # ───────────────────────────────────────────────────────────────
  - id: upload
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [adjudicate]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        TS=$(date -u +%Y%m%dT%H%M%SZ)
        DEST="gs://${_OUTPUT_BUCKET}/${_OUTPUT_PREFIX}/$$TS"
        for f in \
          classify_train_pool.jsonl \
          classify_test_v2.jsonl \
          classify_jury_raw.jsonl \
          classify_candidate_gold.jsonl \
          classify_adjudication_queue.jsonl \
          classify_jury_summary.json ; do
          gcloud storage cp /workspace/$$f "$$DEST/$$f"
        done
        echo "Outputs written to $$DEST"
