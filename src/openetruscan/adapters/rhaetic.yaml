# =============================================================================
# OpenEtruscan — Rhaetic Alphabet Adapter
# =============================================================================
# Rhaetic: a Tyrsenian language spoken in the eastern Alps (Trentino-Alto Adige,
# Veneto, Tyrol) from ~6th–1st century BCE. Part of the Tyrsenian family
# alongside Etruscan and Lemnian. ~300 inscriptions known, mostly short
# votive texts on rock surfaces, deer antlers, and bronze objects.
# Uses a North Italic alphabet variant closely related to Etruscan script.
# =============================================================================

language_id: rhaetic
display_name: Rhaetic
iso_639_3: xrr
script: old_italic
unicode_range: [0x10300, 0x1032F]
direction: rtl  # Right-to-left or boustrophedon

# =============================================================================
# ALPHABET
# Rhaetic uses a North Italic (Sanzeno/Bolzano) alphabet variant.
# Like Etruscan, it lacks voiced stops /b/, /d/, /g/ and the vowel /o/.
# The alphabet is fundamentally Etruscan-derived but with local variants.
# =============================================================================
alphabet:
  a:
    unicode: "\U00010300"
    ipa: "a"
    variants: ["A", "a"]

  e:
    unicode: "\U00010304"
    ipa: "e"
    variants: ["E", "e"]

  v:
    unicode: "\U00010305"
    ipa: "v"
    variants: ["V", "v", "W", "w"]
    notes: "Labial fricative or approximant"

  z:
    unicode: "\U00010306"
    ipa: "ts"
    variants: ["Z", "z"]
    notes: "Voiceless affricate /ts/"

  h:
    unicode: "\U00010307"
    ipa: "h"
    variants: ["H", "h"]

  θ:
    unicode: "\U00010308"
    ipa: "tʰ"
    variants: ["TH", "Th", "th", "θ", "Θ"]
    notes: "Aspirated dental stop — common in Rhaetic"

  i:
    unicode: "\U00010309"
    ipa: "i"
    variants: ["I", "i"]

  k:
    unicode: "\U0001030A"
    ipa: "k"
    variants: ["K", "k", "C", "c"]
    notes: "Velar stop — Rhaetic uses K predominantly"

  l:
    unicode: "\U0001030B"
    ipa: "l"
    variants: ["L", "l"]

  m:
    unicode: "\U0001030C"
    ipa: "m"
    variants: ["M", "m"]

  n:
    unicode: "\U0001030D"
    ipa: "n"
    variants: ["N", "n"]

  p:
    unicode: "\U00010310"
    ipa: "p"
    variants: ["P", "p"]

  ś:
    unicode: "\U00010311"
    ipa: "ʃ"
    variants: ["Ś", "ś", "SH", "Sh", "sh", "S2", "s2"]
    notes: "Palatalized sibilant, as in Etruscan"

  r:
    unicode: "\U00010313"
    ipa: "r"
    variants: ["R", "r"]

  s:
    unicode: "\U00010314"
    ipa: "s"
    variants: ["S", "s"]

  t:
    unicode: "\U00010315"
    ipa: "t"
    variants: ["T", "t"]

  u:
    unicode: "\U00010316"
    ipa: "u"
    variants: ["U", "u"]

  φ:
    unicode: "\U00010318"
    ipa: "pʰ"
    variants: ["PH", "Ph", "ph", "φ", "Φ"]
    notes: "Aspirated bilabial stop"

  χ:
    unicode: "\U00010317"
    ipa: "kʰ"
    variants: ["CH", "Ch", "ch", "KH", "Kh", "kh", "χ", "Χ"]
    notes: "Aspirated velar stop"

# =============================================================================
# EQUIVALENCE CLASSES
# =============================================================================
equivalence_classes:
  aspirated_dental:
    canonical: "θ"
    members: ["th", "TH", "Th", "θ", "Θ"]
  aspirated_bilabial:
    canonical: "φ"
    members: ["ph", "PH", "Ph", "φ", "Φ"]
  aspirated_velar:
    canonical: "χ"
    members: ["ch", "CH", "Ch", "kh", "KH", "Kh", "χ", "Χ"]
  palatalized_sibilant:
    canonical: "ś"
    members: ["sh", "SH", "Sh", "ś", "Ś", "s2", "S2"]

# =============================================================================
# PHONOTACTICS
# Rhaetic phonology is close to Etruscan: no voiced stops, no /o/.
# =============================================================================
phonotactics:
  forbidden_word_final: []
  forbidden_clusters: ["kt", "gp", "bd", "gd"]
  max_consonant_cluster: 3
  vowels: ["a", "e", "i", "u"]
  notes: "Like Etruscan, Rhaetic lacks /o/ and voiced stops /b/, /d/, /g/"

# =============================================================================
# ONOMASTICS
# Rhaetic onomastics are partially understood. Many names show Etruscan
# parallels, supporting the Tyrsenian family hypothesis.
# =============================================================================
onomastics:
  formula_order:
    - praenomen
    - patronymic
    - gentilicium

  genitive_markers:
    male: ["-ale", "-si", "-s"]
    female: ["-ale", "-s"]

  gender_markers:
    male_endings: []
    female_endings: ["-a", "-ia", "-u"]
    female_gentilicium_suffix: ["-a", "-ia"]

  known_praenomina:
    male:
      - eluku
      - θina
      - kvestnei
      - laivisku
      - φelna
      - velθanu
      - upiku
      - remiku
      - pitale
      - lavise
    female:
      - φaia
      - śana
      - rina

  known_gentilicia:
    - kasanale
    - φeluriesi
    - eθinule
    - klanive
    - ψiakhe
    - lavise
    - venetale
    - tresikvale
    - ritale
    - rasiake
