# OpenEtruscan Backend Stack
# Frontend is deployed on Vercel (openetruscan.com)
# API + PostGIS + Fuseki run here behind nginx TLS proxy (api.openetruscan.com)
#
# Production (COS): use raw docker commands (no docker compose on COS)
# Local dev: docker compose up -d --build

services:
  api:
    build: .
    restart: unless-stopped
    mem_limit: 1600m
    env_file:
      - .env
    ports:
      - "8000:8000"

  # Frontend is deployed on Vercel (openetruscan.com), not on this VM. The
  # `./frontend` directory does not exist in this repo, so any service that
  # builds it will fail `docker compose up -d --build`. Do not re-add unless
  # the frontend is being moved on-prem.

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${CERT_PATH:-/home/edoardo.panichi/certs}:/certs:ro
    depends_on:
      - api

  fuseki:
    image: stain/jena-fuseki:latest
    restart: unless-stopped
    user: root
    mem_limit: 512m
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-etruscan_sparql}
      FUSEKI_DATASET_1: openetruscan
      # Constrain JVM heap to fit the e2-small VM. Without this, Fuseki claims a
      # 4 GiB heap on a 1.9 GiB host and the OOM-killer becomes a problem under load.
      JAVA_OPTIONS: "-Xmx384m -Xms128m"
    volumes:
      - fuseki_data:/fuseki
      - ./data/rdf:/staging:ro
    expose:
      - "3030"
    entrypoint: >
      /bin/bash -c '
        mkdir -p /fuseki/databases/openetruscan;
        if [ ! -f /fuseki/databases/openetruscan/.loaded ]; then
          echo "Loading RDF data into TDB1...";
          /jena-fuseki/tdbloader --loc /fuseki/databases/openetruscan /staging/corpus.ttl;
          touch /fuseki/databases/openetruscan/.loaded;
          echo "RDF loaded successfully.";
        else
          echo "RDF data already loaded, skipping.";
        fi;
        exec /jena-fuseki/fuseki-server --loc /fuseki/databases/openetruscan /openetruscan
      '

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    # edoburu/pgbouncer's auto-config script can't handle DATABASE_URL with
    # a `?ssl=require` querystring — it writes the raw path component
    # (`corpus?ssl=require`) as the [databases] section key, and pgbouncer
    # fails with "syntax error in configuration (pgbouncer.ini:3)" on every
    # start. Pass the components explicitly instead. The values are derived
    # from `oe-database-url` by `scripts/ops/fetch-env-from-sm.sh` at
    # deploy time; no new SM secrets needed.
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - AUTH_TYPE=scram-sha-256
      - SERVER_TLS_SSLMODE=require
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - MAX_DB_CONNECTIONS=20
    ports:
      - "6432:5432"

volumes:
  fuseki_data:
