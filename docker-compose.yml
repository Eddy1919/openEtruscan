# OpenEtruscan Backend-Only Stack
# Frontend is deployed on GitHub Pages (openetruscan.com)
# API + PostGIS run here behind nginx TLS proxy (api.openetruscan.com)
#
# Production (COS): use raw docker commands (no docker compose on COS)
# Local dev: docker compose up -d --build

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: corpus
      POSTGRES_USER: corpus_reader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etruscan_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U corpus_reader -d corpus" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://corpus_reader:${POSTGRES_PASSWORD:-etruscan_secret}@db/corpus
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ~/certs:/certs:ro
    depends_on:
      - api

volumes:
  pgdata:

