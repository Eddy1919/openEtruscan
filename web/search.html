<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenEtruscan — Live Search</title>
    <meta name="description" content="Search the OpenEtruscan corpus visually. Full-text and PostGIS radius searching.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-primary: #0f0f12;
            --bg-secondary: #1a1a22;
            --bg-card: #1e1e28;
            --text-primary: #e8e6e3;
            --text-secondary: #9a9890;
            --text-muted: #6b6962;
            --accent: #c4704b;
            --accent-light: #d4855f;
            --accent-dim: #8b4f35;
            --accent-glow: rgba(196, 112, 75, 0.15);
            --border: #2a2a36;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Layout */
        .sidebar {
            width: 400px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.3);
        }

        .header {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 0.25rem;
        }

        .header h1 .etruscan {
            color: var(--accent);
            letter-spacing: 2px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 300;
            line-height: 1.4;
        }

        .search-form {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        .btn-search {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.8rem;
            border-radius: 6px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-search:hover {
            background: var(--accent-light);
        }

        .api-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 0.5rem;
        }

        .api-status.connected {
            color: #4ade80;
        }

        .api-status.error {
            color: #f87171;
        }

        .results-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: var(--bg-primary);
            scrollbar-width: thin;
            scrollbar-color: var(--accent-dim) var(--bg-primary);
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
        }

        .result-card:hover {
            border-color: var(--accent-dim);
            transform: translateY(-2px);
        }

        .result-id {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .result-text {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            word-break: break-all;
        }

        .result-italic {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
        }

        .result-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .clan-badge {
            display: inline-block;
            background: rgba(196, 112, 75, 0.2);
            color: var(--accent-light);
            border: 1px solid var(--accent);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-family: var(--font-body);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 8px;
            cursor: pointer;
            vertical-align: middle;
            transition: all 0.2s;
        }

        .clan-badge:hover {
            background: var(--accent);
            color: #fff;
        }

        /* Map Container */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Leaflet Overrides */
        .leaflet-popup-content-wrapper {
            background: var(--bg-card) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
        }

        .leaflet-popup-tip {
            background: var(--bg-card) !important;
            border: 1px solid var(--border) !important;
        }

        .leaflet-popup-content {
            font-family: var(--font-body) !important;
            margin: 12px !important;
        }

        .map-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(30, 30, 40, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--text-primary);
            pointer-events: none;
        }

        .pulse-instruction {
            color: var(--accent-light);
            font-weight: 500;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        .nav-links {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent);
            border-bottom: 1px solid var(--accent);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <header class="header">
            <h1><span class="etruscan">𐌏𐌐𐌄𐌍</span> OpenEtruscan</h1>
            <p>Live Database Search</p>
            <nav class="nav-links" style="margin-top: 15px; display: flex; gap: 15px; flex-wrap: wrap;">
                <a href="index.html" style="color: var(--text-muted); text-decoration: none; transition: color 0.2s;"
                    onmouseover="this.style.color='var(--accent)'"
                    onmouseout="this.style.color='var(--text-muted)'">Normalizer</a>
                <a href="search.html" style="color: var(--accent); font-weight: 600; text-decoration: none;">Live
                    Search</a>
                <a href="map.html" style="color: var(--text-muted); text-decoration: none; transition: color 0.2s;"
                    onmouseover="this.style.color='var(--accent)'"
                    onmouseout="this.style.color='var(--text-muted)'">Static Map</a>
                <a href="stats.html" style="color: var(--text-muted); text-decoration: none; transition: color 0.2s;"
                    onmouseover="this.style.color='var(--accent)'"
                    onmouseout="this.style.color='var(--text-muted)'">Statistics</a>
            </nav>
        </header>

        <form class="search-form" id="searchForm">
            <div class="form-group">
                <label for="apiUrl">API Endpoint</label>
                <input type="text" id="apiUrl" value="/api" placeholder="e.g. /api or http://127.0.0.1:8000">
            </div>

            <div class="form-group">
                <label for="q">Text Search (Wildcard)</label>
                <input type="text" id="q" placeholder="e.g. *larth*" autocomplete="off">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="findspot">Findspot</label>
                    <input type="text" id="findspot" placeholder="e.g. Vulci">
                </div>
                <div class="form-group">
                    <label for="radius">Radius (km)</label>
                    <input type="number" id="radius" value="50" min="1" max="500">
                </div>
            </div>

            <button type="submit" class="btn-search">Search Local Database</button>
            <div class="api-status" id="apiStatus">Waiting for API connection...</div>
        </form>

        <div class="results-container" id="resultsContainer">
            <div class="results-header">
                <span id="resultsCount">0 results</span>
                <span id="resultsTime">0ms</span>
            </div>
            <div id="resultsList">
                <div style="color: var(--text-muted); text-align: center; margin-top: 2rem; font-size: 0.9rem;">
                    Enter a text query or click anywhere on the map to trigger a PostGIS radius search!
                </div>
            </div>
        </div>
    </div>

    <div class="map-container">
        <div class="map-overlay">
            <div class="pulse-instruction">👉 Click anywhere on the map to run a Radius Search</div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Init leafet
        const map = L.map('map', { zoomControl: false }).setView([42.5, 12.0], 7);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: 'CARTO',
            subdomains: 'abcd',
            maxZoom: 19,
        }).addTo(map);

        let currentMarkers = [];
        let currentCircle = null;
        let currentLines = null;

        const apiUrlInput = document.getElementById('apiUrl');
        const searchForm = document.getElementById('searchForm');
        const statusEl = document.getElementById('apiStatus');
        const resultsList = document.getElementById('resultsList');
        const resultsCount = document.getElementById('resultsCount');

        // Ping API on load
        async function checkApi() {
            try {
                const res = await fetch(apiUrlInput.value + '/stats');
                if (res.ok) {
                    const data = await res.json();
                    statusEl.textContent = `Connected! Global corpus: ${data.total_inscriptions} inscriptions`;
                    statusEl.className = 'api-status connected';
                }
            } catch (e) {
                statusEl.textContent = 'Offline. Start FastAPI server: uvicorn openetruscan.server:app';
                statusEl.className = 'api-status error';
            }
        }
        checkApi();
        apiUrlInput.addEventListener('change', checkApi);

        // Render Results
        function renderResults(data) {
            resultsCount.textContent = `${data.count} results (Total matching: ${data.total})`;

            // Clear map
            currentMarkers.forEach(m => map.removeLayer(m));
            currentMarkers = [];

            if (data.results.length === 0) {
                resultsList.innerHTML = `<div style="text-align:center; color:#6b6962; padding:2rem;">No inscriptions found for this query.</div>`;
                return;
            }

            let html = '';
            const bounds = [];

            data.results.forEach(insc => {
                // Sidebar HTML
                const badgeHtml = insc.gens ? `<span class="clan-badge" onclick="event.stopPropagation(); window.searchClan('${insc.gens}')">${insc.gens} Family</span>` : '';
                html += `
                    <div class="result-card" onclick="panTo(${insc.findspot_lat || 42.5}, ${insc.findspot_lon || 12.0})">
                        <div class="result-id">
                            <span>${insc.id}</span>
                            <span style="color:#6b6962">${insc.classification}</span>
                        </div>
                        <div class="result-text">${insc.canonical || '—'} ${badgeHtml}</div>
                        <div class="result-italic">${insc.old_italic || '—'}</div>
                        <div class="result-meta">
                            <div>📍 ${insc.findspot || 'Unknown Location'}</div>
                            <div>⏳ ${insc.date_display || 'Unknown Date'}</div>
                        </div>
                    </div>
                `;

                // Map Markers
                if (insc.findspot_lat && insc.findspot_lon) {
                    const marker = L.circleMarker([insc.findspot_lat, insc.findspot_lon], {
                        radius: 6,
                        fillColor: '#c4704b',
                        color: '#1e1e28',
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    });

                    marker.bindPopup(`
                        <div style="font-family:'JetBrains Mono',monospace; color:#c4704b; font-size:10px; font-weight:bold;">${insc.id}</div>
                        <div style="font-family:'JetBrains Mono',monospace; font-size:14px; margin:5px 0;">${insc.canonical}</div>
                        <div style="font-size:11px; color:#9a9890;">${insc.findspot}</div>
                    `);

                    marker.addTo(map);
                    currentMarkers.push(marker);
                    bounds.push([insc.findspot_lat, insc.findspot_lon]);
                }
            });

            resultsList.innerHTML = html;

            // Fit map to results if there is no hardcoded circle
            if (bounds.length > 0 && !currentCircle && !currentLines) {
                map.fitBounds(L.latLngBounds(bounds), { padding: [50, 50], maxZoom: 10 });
            }
        }

        // Action: Standard Search
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (currentCircle) {
                map.removeLayer(currentCircle);
                currentCircle = null;
            }
            if (currentLines) {
                map.removeLayer(currentLines);
                currentLines = null;
            }

            resultsList.innerHTML = `<div style="text-align:center; padding:2rem;">Searching...</div>`;
            const q = document.getElementById('q').value;
            const findspot = document.getElementById('findspot').value;

            const url = new URL(apiUrlInput.value + '/search');
            if (q) url.searchParams.append('text', q);
            if (findspot) url.searchParams.append('findspot', findspot);

            const start = performance.now();
            try {
                const res = await fetch(url.toString());
                const data = await res.json();
                document.getElementById('resultsTime').textContent = Math.round(performance.now() - start) + 'ms';
                renderResults(data);
            } catch (err) {
                resultsList.innerHTML = `<div style="color:#f87171; padding:1rem;">API Error: Cannot connect to server.</div>`;
            }
        });

        // Action: Map Click Radius Search
        map.on('click', async (e) => {
            const lat = e.latlng.lat;
            const lon = e.latlng.lng;
            const radiusKm = parseFloat(document.getElementById('radius').value) || 50;

            // Clear text inputs
            document.getElementById('q').value = '';
            document.getElementById('findspot').value = '';

            // Draw circle
            if (currentCircle) map.removeLayer(currentCircle);
            currentCircle = L.circle([lat, lon], {
                radius: radiusKm * 1000,
                color: '#d4855f',
                fillColor: '#c4704b',
                fillOpacity: 0.1,
                weight: 2,
                dashArray: "4 4"
            }).addTo(map);

            map.panTo([lat, lon]);

            resultsList.innerHTML = `<div style="text-align:center; padding:2rem;">Running PostGIS Radius Query...</div>`;

            const start = performance.now();
            try {
                const url = new URL(apiUrlInput.value + '/radius');
                url.searchParams.append('lat', lat);
                url.searchParams.append('lon', lon);
                url.searchParams.append('radius_km', radiusKm);

                const res = await fetch(url.toString());
                const data = await res.json();
                document.getElementById('resultsTime').textContent = Math.round(performance.now() - start) + 'ms';
                renderResults(data);
            } catch (err) {
                resultsList.innerHTML = `<div style="color:#f87171; padding:1rem;">API Error: Cannot connect to server.</div>`;
            }
        });

        // Action: Clan Network Search
        window.searchClan = async function (gens) {
            // Clear prior states
            if (currentCircle) { map.removeLayer(currentCircle); currentCircle = null; }
            if (currentLines) { map.removeLayer(currentLines); currentLines = null; }

            document.getElementById('q').value = '';
            document.getElementById('findspot').value = '';
            resultsList.innerHTML = `<div style="text-align:center; padding:2rem;">Mapping ${gens} Family Network...</div>`;

            const start = performance.now();
            try {
                const url = new URL(apiUrlInput.value + '/clan/' + encodeURIComponent(gens));
                const res = await fetch(url.toString());
                const data = await res.json();
                document.getElementById('resultsTime').textContent = Math.round(performance.now() - start) + 'ms';

                renderResults(data);

                // Extract unique valid coordinates for the network lines
                const validCoords = data.results
                    .filter(i => i.findspot_lat && i.findspot_lon)
                    .map(i => [i.findspot_lat, i.findspot_lon]);

                if (validCoords.length > 1) {
                    currentLines = L.polyline(validCoords, {
                        color: '#d4855f',
                        weight: 2,
                        dashArray: "4 8",
                        opacity: 0.8
                    }).addTo(map);
                    map.fitBounds(currentLines.getBounds(), { padding: [50, 50] });
                } else if (validCoords.length === 1) {
                    map.flyTo(validCoords[0], 10);
                }

            } catch (err) {
                resultsList.innerHTML = `<div style="color:#f87171; padding:1rem;">API Error: Cannot fetch clan data.</div>`;
            }
        };

        // Global panTo
        window.panTo = function (lat, lon) {
            map.flyTo([lat, lon], 12);
        };
    </script>
</body>

</html>
